name: Validate framework

on:
  push:
    branches: [main, beta]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate configuration
        run: python scripts/validate_codex_config.py --quiet

      - name: Compile Python scripts
        run: python -m py_compile scripts/build_role_index.py scripts/sync_codex_config.py scripts/validate_codex_config.py

      - name: Test Linux/macOS installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          ./installers/install-codex-framework.sh
          test -f "$CODEX_HOME/AGENTS.md"
          grep -F "$GITHUB_WORKSPACE" "$CODEX_HOME/AGENTS.md"

      - name: Test Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP "codex-home"
          .\installers\install-codex-framework.ps1
          $target = Join-Path $env:CODEX_HOME "AGENTS.md"
          if (-not (Test-Path -LiteralPath $target)) {
            throw "AGENTS.md was not installed."
          }
          $repoForPrompt = $env:GITHUB_WORKSPACE.Replace("\", "/")
          if (-not (Select-String -LiteralPath $target -SimpleMatch $repoForPrompt)) {
            throw "Installed pre-prompt does not reference the repository."
          }
